<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ai Guy Controller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      color: #fff; font-family: sans-serif; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 8px;
      pointer-events: none; white-space: nowrap;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: white; font-family: sans-serif; font-size: 22px;
      background: rgba(0,0,0,0.6); padding: 20px 40px; border-radius: 12px;
    }
  </style>
</head>
<body>
<div id="info">W / S = Move &nbsp;|&nbsp; A / D = Rotate &nbsp;|&nbsp; Mouse = Camera &nbsp;|&nbsp; Scroll = Zoom</div>
<div id="loading">Loading Ai Guy... 0%</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { FBXLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/FBXLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 100);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 3, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(10, 20, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 100;
sun.shadow.camera.left = -20;
sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -20;
scene.add(sun);

scene.add(Object.assign(new THREE.DirectionalLight(0x8888ff, 0.4), { position: new THREE.Vector3(-10, 5, -10) }));

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x2d2d44, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
scene.add(new THREE.GridHelper(200, 60, 0x444466, 0x333355));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 40;
controls.maxPolarAngle = Math.PI / 2 - 0.02;
controls.target.set(0, 1, 0);

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

let character = null, mixer = null;
const moveSpeed = 0.07, rotateSpeed = 0.035;
const clock = new THREE.Clock();
const loadingEl = document.getElementById('loading');

const loader = new FBXLoader();
loader.load(
  'https://raw.githubusercontent.com/aryarambod/files/main/Ai%20guy.fbx',
  (fbx) => {
    loadingEl.remove();
    const box = new THREE.Box3().setFromObject(fbx);
    const h = box.getSize(new THREE.Vector3()).y;
    fbx.scale.setScalar(2.2 / h);
    const box2 = new THREE.Box3().setFromObject(fbx);
    fbx.position.y = -box2.min.y;
    fbx.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    scene.add(fbx);
    character = fbx;
    if (fbx.animations?.length) {
      mixer = new THREE.AnimationMixer(fbx);
      mixer.clipAction(fbx.animations[0]).play();
    }
  },
  (xhr) => {
    if (xhr.total) loadingEl.textContent = `Loading Ai Guy... ${Math.round(xhr.loaded / xhr.total * 100)}%`;
  },
  (err) => {
    loadingEl.textContent = '❌ Error loading model';
    console.error(err);
  }
);

const camOffset = new THREE.Vector3(0, 3, 7);
const lookTarget = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (mixer) mixer.update(delta);
  if (character) {
    if (keys['KeyA'] || keys['ArrowLeft'])  character.rotation.y += rotateSpeed;
    if (keys['KeyD'] || keys['ArrowRight']) character.rotation.y -= rotateSpeed;
    const dir = new THREE.Vector3(Math.sin(character.rotation.y), 0, Math.cos(character.rotation.y));
    if (keys['KeyW'] || keys['ArrowUp'])   character.position.addScaledVector(dir,  moveSpeed);
    if (keys['KeyS'] || keys['ArrowDown']) character.position.addScaledVector(dir, -moveSpeed);
    const ideal = camOffset.clone().applyEuler(new THREE.Euler(0, character.rotation.y, 0)).add(character.position);
    camera.position.lerp(ideal, 0.06);
    lookTarget.copy(character.position).add(new THREE.Vector3(0, 1.5, 0));
    controls.target.lerp(lookTarget, 0.06);
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
